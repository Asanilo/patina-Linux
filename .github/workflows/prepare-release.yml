name: Publish Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version tag to publish, for example 1.7.6"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*-*"

permissions:
  contents: write

jobs:
  publish-linux:
    name: Build and publish Linux release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null || {
              echo "Tag $tag does not exist. Prepare and push the release tag first." >&2
              exit 1
            }
          fi

          git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          git checkout "$tag"
          test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libpulse-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxcb-screensaver0-dev \
            patchelf \
            wget \
            zip

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        run: |
          node --experimental-strip-types scripts/release.ts validate-version-files "${{ steps.release.outputs.version }}"
          node --experimental-strip-types scripts/release.ts validate-changelog "${{ steps.release.outputs.version }}"
          node --experimental-strip-types scripts/release.ts write-release-notes \
            "${{ steps.release.outputs.version }}" \
            dist-release/release-notes.md

      - name: Run release quality gate
        run: npm run release:check

      - name: Prepare updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret." >&2
            exit 1
          }

          signing_key_path="$RUNNER_TEMP/tauri-signing.key"
          printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY" > "$signing_key_path"
          chmod 600 "$signing_key_path"
          test -s "$signing_key_path"
          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$signing_key_path" >> "$GITHUB_ENV"

      - name: Build AppImage and Debian bundles
        shell: bash
        run: |
          set -euo pipefail

          signing_key_path="${TAURI_SIGNING_PRIVATE_KEY_PATH:?Missing signing key path}"
          test -s "$signing_key_path" || {
            echo "Prepared signing key file is missing or empty." >&2
            exit 1
          }

          export TAURI_SIGNING_PRIVATE_KEY="$(cat "$signing_key_path")"
          npm run tauri build -- --bundles appimage,deb
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Cleanup updater signing key
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/tauri-signing.key"

      - name: Prepare Linux release assets
        run: |
          node --experimental-strip-types scripts/release.ts prepare-linux-release-assets \
            "${{ steps.release.outputs.version }}" \
            src-tauri/target/release/bundle \
            dist-release \
            "${{ github.repository }}"

      - name: Package GNOME Shell extension
        shell: bash
        run: |
          npm run extension:gnome:build
          extension_version="$(node -p "require('./extensions/gnome-shell/patina-window-tracker@patina/metadata.json').version")"
          extension_asset="patina-gnome-shell-extension-v${extension_version}.zip"
          (
            cd dist/extensions/gnome-shell
            zip -r "../../../dist-release/${extension_asset}" patina-window-tracker@patina
          )
          echo "GNOME_EXTENSION_ASSET=$extension_asset" >> "$GITHUB_ENV"

      - name: Package Chromium extension
        shell: bash
        run: |
          npm run extension:chromium:package
          extension_version="$(node -p "require('./extensions/chromium/manifest.json').version")"
          extension_asset="patina-chromium-extension-v${extension_version}.zip"
          cp "dist/extensions/chromium/${extension_asset}" "dist-release/${extension_asset}"
          echo "CHROMIUM_EXTENSION_ASSET=$extension_asset" >> "$GITHUB_ENV"

      - name: Package signed Firefox extension
        shell: bash
        run: |
          extension_version="$(node -p "require('./extensions/firefox/manifest.json').version")"
          extension_asset="patina-firefox-extension-v${extension_version}.xpi"
          cp extensions/firefox/dist/patina-web-sync.xpi "dist-release/${extension_asset}"
          echo "FIREFOX_EXTENSION_ASSET=$extension_asset" >> "$GITHUB_ENV"

      - name: Publish Linux release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Patina v${{ steps.release.outputs.version }}
          body_path: dist-release/release-notes.md
          draft: false
          prerelease: ${{ contains(steps.release.outputs.version, '-') }}
          overwrite_files: true
          files: |
            dist-release/Patina_${{ steps.release.outputs.version }}_amd64.AppImage
            dist-release/Patina_${{ steps.release.outputs.version }}_amd64.AppImage.tar.gz
            dist-release/Patina_${{ steps.release.outputs.version }}_amd64.deb
            dist-release/${{ env.GNOME_EXTENSION_ASSET }}
            dist-release/${{ env.CHROMIUM_EXTENSION_ASSET }}
            dist-release/${{ env.FIREFOX_EXTENSION_ASSET }}
            dist-release/latest.json
